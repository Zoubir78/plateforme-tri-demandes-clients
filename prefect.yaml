# ══════════════════════════════════════════════════════════════════════════════
# prefect.yaml — Signal Conso KPI Pipeline
# ══════════════════════════════════════════════════════════════════════════════
#
# Ce fichier déclare 4 déploiements indépendants (un par KPI) + 1 déploiement
# pour le pipeline complet.
#
# Commandes utiles :
#   prefect deploy --all                          # déploie tous les deployments
#   prefect deploy --name signal-conso-pipeline   # déploie un seul deployment
#   prefect worker start --pool signal-conso-pool # démarre le worker local
#
# Prérequis :
#   pip install prefect>=2.14 google-cloud-storage pandas
#   export GCS_BUCKET_NAME=clean_complaints
#   export GOOGLE_APPLICATION_CREDENTIALS=/path/to/sa-key.json
# ══════════════════════════════════════════════════════════════════════════════

name: signal-conso

build: null
push: null

pull:
  - prefect.deployments.steps.git_clone:
      id: git_clone
      repository: https://github.com/Zoubir78/plateforme-tri-demandes-clients.git
      branch: main
  - prefect.deployments.steps.set_working_directory:
      directory: "{{ git_clone.directory }}"
  - prefect.deployments.steps.pip_install_requirements:
      requirements_file: requirements-flows.txt 
      stream_output: true

deployments:
  - name: signal-conso-pipeline
    version: "1.0.0"
    tags:
      - signal-conso
      - pipeline
      - kpi
      - gcs
    description: >
      Pipeline complet Signal Conso : extraction GCS → filtrage → calcul des
      KPIs → publication d'artifacts.

    entrypoint: src/app/flows/signal_conso_flows.py:kpi_pipeline_flow

    work_pool:
      name: signal-conso-pool
      work_queue_name: default
      job_variables:
        env:
          GCS_BUCKET_NAME: "clean_complaints"
          GCS_PROCESSED_PREFIX: "processed/"
          GOOGLE_APPLICATION_CREDENTIALS: "./secrets/tri-demandes-clients-da1709669c29.json"

    schedule:
      cron: "0 */4 * * *"
      timezone: Europe/Paris
      active: true

    parameters:
      bucket_name: "clean_complaints"
      prefix: "processed/"
      period: "Depuis le début du mois"
      region: null
      department_label: null

    concurrency_limit: 1

  - name: kpi-nombre-signalements
    version: "1.0.0"
    tags:
      - signal-conso
      - kpi
      - nombre-signalements
    description: >
      Calcule en temps réel le nombre total de signalements Signal Conso.

    entrypoint: src/app/flows/signal_conso_flows.py:flow_nombre_signalements

    work_pool:
      name: signal-conso-pool
      work_queue_name: default
      job_variables:
        env:
          GCS_BUCKET_NAME: "clean_complaints"
          GCS_PROCESSED_PREFIX: "processed/"
          GOOGLE_APPLICATION_CREDENTIALS: "./secrets/tri-demandes-clients-da1709669c29.json"

    schedule:
      cron: "0 */4 * * *"
      timezone: Europe/Paris
      active: true

    parameters: {}

    concurrency_limit: 1

  - name: kpi-transmis-global
    version: "1.0.0"
    tags:
      - signal-conso
      - kpi
      - transmis
      - transmis-lus
    description: >
      Calcule les KPIs signalements transmis et signalements transmis lus.

    entrypoint: src/app/flows/signal_conso_flows.py:flow_transmis_global

    work_pool:
      name: signal-conso-pool
      work_queue_name: default
      job_variables:
        env:
          GCS_BUCKET_NAME: "clean_complaints"
          GCS_PROCESSED_PREFIX: "processed/"
          GOOGLE_APPLICATION_CREDENTIALS: "./secrets/tri-demandes-clients-da1709669c29.json"

    schedule:
      cron: "0 */4 * * *"
      timezone: Europe/Paris
      active: true

    parameters:
      kpi_type: both

    concurrency_limit: 1

  - name: kpi-signalements-lus-reponse
    version: "1.0.0"
    tags:
      - signal-conso
      - kpi
      - reponse
    description: >
      Calcule en temps réel la part des signalements lus ayant reçu une réponse.

    entrypoint: src/app/flows/signal_conso_flows.py:flow_signalements_lus_reponse

    work_pool:
      name: signal-conso-pool
      work_queue_name: default
      job_variables:
        env:
          GCS_BUCKET_NAME: "clean_complaints"
          GCS_PROCESSED_PREFIX: "processed/"
          GOOGLE_APPLICATION_CREDENTIALS: "./secrets/tri-demandes-clients-da1709669c29.json"

    schedule:
      cron: "0 */4 * * *"
      timezone: Europe/Paris
      active: true

    parameters: {}

    concurrency_limit: 1

  - name: signal-conso-daily-report
    version: "1.0.0"
    tags:
      - signal-conso
      - pipeline
      - daily
    description: >
      Rapport KPI quotidien Signal Conso déclenché à 08h00 (Europe/Paris).

    entrypoint: src/app/flows/signal_conso_flows.py:kpi_pipeline_flow

    work_pool:
      name: signal-conso-pool
      work_queue_name: default
      job_variables:
        env:
          GCS_BUCKET_NAME: "clean_complaints"
          GCS_PROCESSED_PREFIX: "processed/"
          GOOGLE_APPLICATION_CREDENTIALS: "./secrets/tri-demandes-clients-da1709669c29.json"

    schedule:
      cron: "0 8 * * *"
      timezone: Europe/Paris
      active: true

    parameters:
      bucket_name: "clean_complaints"
      prefix: "processed/"
      period: "Depuis le début du mois"
      region: null
      department_label: null

    concurrency_limit: 1

# ──────────────────────────────────────────────────────────────────────────────
# NOTES DE DÉPLOIEMENT
# ──────────────────────────────────────────────────────────────────────────────
#
# 1. Créer le work pool (une seule fois) :
#      prefect work-pool create signal-conso-pool --type process
#
# 2. Déployer tous les flows :
#      prefect deploy --all
#
# 3. Démarrer le worker :
#      prefect worker start --pool signal-conso-pool
#
# 4. Déclencher manuellement un flow :
#      prefect deployment run 'kpi-pipeline-flow/signal-conso-pipeline' \
#        --param period="7 derniers jours" \
#        --param region="Île-de-France"
#
# 5. Surveiller les runs :
#      prefect flow-run ls
#      prefect flow-run inspect <run-id>
#
# ──────────────────────────────────────────────────────────────────────────────
