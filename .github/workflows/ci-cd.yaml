name: CI/CD - Streamlit + API ML

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  IMAGE_NAME_STREAMLIT: streamlit-app
  IMAGE_NAME_API: fastapi-api

jobs:

# =========================
# 1. TESTS
# =========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q

# =========================
# 2. BUILD DOCKER IMAGES
# =========================
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -------------------------
      # Streamlit image
      # -------------------------
      - name: Build Streamlit image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME_STREAMLIT:latest .

      - name: Push Streamlit image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME_STREAMLIT:latest

      # -------------------------
      # API image
      # -------------------------
      - name: Build API image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME_API:latest ./api

      - name: Push API image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME_API:latest

# =========================
# 3. DEPLOY (OPTION SIMPLE VPS)
# =========================
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /app

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/streamlit-app:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/fastapi-api:latest

            docker-compose down
            docker-compose up -d